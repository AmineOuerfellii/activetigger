services:
  postgres:
    networks:
      - app-net
    image: postgres:${POSTGRES_VERSION}
    restart: ${RESTART_POLICY}
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ${DATA_PATH}/postgresql/:/var/lib/postgresql/data
  api:
    networks:
      - app-net
    build:
      context: ./api
      dockerfile: ./Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION}
        - USER_ID=${USER_ID}
        - GROUP_ID=${GROUP_ID}
    entrypoint: /entrypoint.sh
    restart: ${RESTART_POLICY}
    user: ${USER_ID}:${GROUP_ID}
    depends_on:
      - postgres
    volumes:
      - ${PROJECT_PATH}/docker/api/entrypoint.sh:/entrypoint.sh
      - ${PROJECT_PATH}/api:/api
      - ${DATA_PATH}:/data
      - ${PROJECT_PATH}/docker/api/venv:/home/python/venv
    env_file: ".env"
    environment:
      - DATA_PATH=/data
      - GPU=false
  frontend:
    networks:
      - app-net
    image: node:${NODE_VERSION}
    entrypoint: /entrypoint.sh
    restart: ${RESTART_POLICY}
    volumes:
      - ${PROJECT_PATH}/docker/frontend/entrypoint.sh:/entrypoint.sh
      - ${PROJECT_PATH}/frontend:/frontend
      - frontend_node_modules:/frontend/node_modules
    environment:
      - API_PORT=${API_PORT}
      - MODE=${MODE}
      - VITE_API_URL=${API_URL}
  nginx:
      networks:
        - app-net
      image: nginx:latest
      restart: ${RESTART_POLICY}
      ports:
        - "80:80"
      volumes:
        - ${PROJECT_PATH}/docker/nginx.dev.conf:/etc/nginx/conf.d/default.conf
      depends_on:
        - api
        - frontend
networks:
  app-net:
    driver: bridge
volumes:
  frontend_node_modules:
